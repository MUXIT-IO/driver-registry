name: Validate Driver Entries

on:
  pull_request:
    branches: [main]
    paths:
      - 'drivers/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate driver entries
        run: node scripts/validate-entry.js

      - name: Test registry build
        run: node scripts/build-registry.js
